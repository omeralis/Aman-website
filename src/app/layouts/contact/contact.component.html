<section id="contact">
    <div class="container">
        <div class="content">
            <div class="section-header">
                <h2> {{'contact.contact' | translate }} </h2>
            </div>
            <p class="description">
                {{'contact.content-contact' | translate }}
            </p>
            <div class="row">

                <div class="col-md-6">
                    <form class="form">
                        <input type="text" placeholder="{{'contact.name' | translate }}" />
                        <input type="text" placeholder="{{'contact.email' | translate }}" />
                        <input type="text" placeholder="{{'contact.phone' | translate }}" />
                        <p type="Message"><textarea class="form-control" id="exampleFormControlTextarea1"
                                rows="3"></textarea></p>

                        <button type="button" class="btn">{{'contact.btn-send' | translate }}</button>
                    </form>
                </div>


                <div class="col-md-6">
                    <div class="responsive-map">
                        <iframe
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2822.7806761080233!2d-93.29138368446431!3d44.96844997909819!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x52b32b6ee2c87c91%3A0xc20dff2748d2bd92!2sWalker+Art+Center!5e0!3m2!1sen!2sus!4v1514524647889"
                            width="600" height="450" frameborder="0" style="border:0" allowfullscreen></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
